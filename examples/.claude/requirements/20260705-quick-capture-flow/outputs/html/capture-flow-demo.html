<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>快速记录流程 Demo</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f4f6f8;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #17202a;
      }
      .phone {
        width: min(390px, 100vw);
        min-height: 720px;
        background: white;
        box-shadow: 0 24px 80px rgba(15, 23, 42, 0.16);
        padding: 24px;
      }
      h1 {
        margin: 0 0 20px;
        font-size: 30px;
        letter-spacing: 0;
      }
      .input, .card, .result {
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        padding: 16px;
        margin-bottom: 16px;
      }
      .muted {
        color: #667085;
        font-size: 14px;
      }
      button {
        border: 0;
        border-radius: 8px;
        padding: 12px 14px;
        background: #2563eb;
        color: white;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main class="phone">
      <h1>快速记录</h1>
      <section class="input">
        <p class="muted">原始输入</p>
        <p>明天下午三点提醒我给妈妈打电话，并记录今天宝宝胎动很多。</p>
        <button>结构化</button>
      </section>
      <section class="card">
        <p class="muted">结构化预览</p>
        <strong>提醒事项</strong>
        <p>给妈妈打电话 - 明天下午 3:00</p>
        <strong>备忘录</strong>
        <p>今天宝宝胎动很多。</p>
        <button>确认保存</button>
      </section>
      <section class="result">
        <p class="muted">已保存</p>
        <p>已创建 1 条备忘录和 1 个提醒事项。</p>
      </section>
    </main>
  </body>
</html>
